repos:
  - repo: local
    hooks:
      - id: game-engine-lint
        name: game-engine / lint
        entry: bash -c 'cd game-engine && python -m black --check src/ tests/ && python -m isort --check-only src/ tests/ && python -m autoflake --check --remove-all-unused-imports --remove-unused-variables -r src/ tests/ && python -m mypy src/'
        language: system
        pass_filenames: false
        files: ^game-engine/

      - id: game-engine-test
        name: game-engine / pytest
        entry: bash -c 'cd game-engine && python -m pytest tests/ -q'
        language: system
        pass_filenames: false
        files: ^game-engine/
        stages: [commit]

      - id: dm-api-lint
        name: dm-api / lint
        entry: bash -c 'cd dm-api && python -m black --check src/ tests/ && python -m isort --check-only src/ tests/ && python -m autoflake --check --remove-all-unused-imports --remove-unused-variables -r src/ tests/ && python -m mypy src/'
        language: system
        pass_filenames: false
        files: ^dm-api/

      - id: dm-api-test
        name: dm-api / pytest
        entry: bash -c 'cd dm-api && python -m pytest tests/ -q'
        language: system
        pass_filenames: false
        files: ^dm-api/
        stages: [commit]

      - id: dm-ui-checks
        name: dm-ui / tsc + eslint
        entry: bash -c 'cd dm-ui && npx tsc --noEmit && npm run lint'
        language: system
        pass_filenames: false
        files: ^dm-ui/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
